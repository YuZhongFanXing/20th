<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>成长寄语</title>
    <style>
        body {
            margin: 0;
            height: 100vh;
            overflow: hidden;
            background: #000;
            font-family: 'STXingkai', '华文行楷', cursive;
        }
        .message-container {
            position: absolute;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            z-index: 2;
        }
        /* 第一阶段文字样式 */
        .phase1 {
            color: #FFB6C1;
            font-size: 2.2rem;
            text-shadow: 0 0 20px #FF69B4;
            text-align: center;
            line-height: 1.8;
            padding: 20px;
            max-width: 80%;
            white-space: normal;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 1;
        }
        /* 第二阶段文字样式 */
        .phase2 {
            color: #FFB6C1;
            font-size: 2.2rem;
            text-shadow: 0 0 20px #FF69B4;
            text-align: center;
            line-height: 1.8;
            padding: 20px;
            max-width: 80%;
            white-space: normal;
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            opacity: 1;
        }
        /* 第三阶段文字样式 */
        .phase3 {
            color: #FFB6C1;
            font-size: 4rem;
            text-shadow: 0 0 20px #FF69B4;
            position: absolute;
            left: 50%;
            transform: translateX(-50%);
            opacity: 0;
            white-space: nowrap;
            animation-duration: 3s;
        }
        @keyframes textAppear {
            to {
                opacity: 1;
                transform: translate(-50%, 0);
            }
        }
        .fade-out {
            animation: fadeOut 1s forwards;
        }
        @keyframes fadeOut {
            to {
                opacity: 0;
                transform: translate(-50%, -50px);
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=ZCOOL+XiaoWei&display=swap" rel="stylesheet">
</head>
<body>
    <div class="message-container">
        <div class="phase1" id="msg1"></div>
        <div class="phase2" id="msg4" style="display: none;"></div>
        <div class="phase3" id="msg2" style="top: 40%; display: none;">那么祝二十岁的我</div>
        <div class="phase3" id="msg3" style="top: 60%; display: none;">生日快乐</div>
    </div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script>
// 星云粒子系统（保持原样）
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(75, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.body.appendChild(renderer.domElement);

const particlesGeometry = new THREE.BufferGeometry();
const particleCount = 15000;
const posArray = new Float32Array(particleCount * 3);
const colorArray = new Float32Array(particleCount * 3);

for(let i = 0; i < particleCount * 3; i++) {
    posArray[i] = (Math.random() - 0.5) * 15;
    colorArray[i] = 0.8 + Math.random() * 0.2;
}

particlesGeometry.setAttribute('position', new THREE.BufferAttribute(posArray, 3));
particlesGeometry.setAttribute('color', new THREE.BufferAttribute(colorArray, 3));

const particlesMaterial = new THREE.PointsMaterial({
    size: 0.03,
    vertexColors: true,
    transparent: true,
    blending: THREE.AdditiveBlending,
    color: 0xFFB6C1
});

const particlesMesh = new THREE.Points(particlesGeometry, particlesMaterial);
scene.add(particlesMesh);

camera.position.z = 7;

function animateNebula() {
    requestAnimationFrame(animateNebula);
    
    const positions = particlesGeometry.attributes.position.array;
    for(let i = 0; i < positions.length; i += 3) {
        positions[i] += Math.sin(Date.now() * 0.0005 + i) * 0.003;
        positions[i+1] += Math.cos(Date.now() * 0.0007 + i) * 0.003;
    }
    particlesGeometry.attributes.position.needsUpdate = true;
    
    renderer.render(scene, camera);
}
animateNebula();

// 文字动画控制
document.addEventListener('DOMContentLoaded', () => {
    const phase1Text = "我精心布下棋局，却未算准每一步落子需要耗费的精力。明明可以岁月静好，但趁着年轻，纵有疲惫缠肩，我偏要负重前行，只愿不负这青春。每番磨砺皆是心境的蜕变，每回经历都是心性的成熟 —— 褪去轻狂，眼底是「天生我材必有用」的笃定；藏起骄躁，心中是「一蓑烟雨任平生」的豁然。可能这就是成长吧：将棱角磨成铠甲，把初心酿成星光。既然留不住光阴的脚步，那就让这青春在时光里淬火成诗，镀就成生命中永不褪色的勋章。抬眼望，前程似锦，未来可期！！！";
    const phase2Text = "不乱于心，不困于情，不畏将来，不念过往，如此，安好。";
    
    // 第一阶段打字效果
    const msg1 = document.getElementById('msg1');
    let index1 = 0;
    
    const typeCharacter1 = () => {
        msg1.textContent += phase1Text[index1];
        index1++;
        
        if (index1 >= phase1Text.length) {
            // 第一段文字显示完成后，启动第二阶段
            setTimeout(() => {
                msg1.classList.add('fade-out');
                setTimeout(() => {
                    msg1.style.display = 'none';
                    startPhase2();
                }, 1000);
            }, 1500);
            return;
        }

        if (/[，。]/.test(phase1Text[index1])) {
            setTimeout(() => {
                typeCharacter1();
            }, 400); // 增加标点符号后的停顿时间
        } else {
            setTimeout(typeCharacter1, 150); // 增加逐字显示的时间间隔
        }
    };

    // 第二阶段打字效果
    const msg4 = document.getElementById('msg4');
    let index2 = 0;
    
    const typeCharacter2 = () => {
        msg4.textContent += phase2Text[index2];
        index2++;
        
        if (index2 >= phase2Text.length) {
            // 第二段文字显示完成后，启动第三阶段
            setTimeout(() => {
                msg4.classList.add('fade-out');
                setTimeout(() => {
                    msg4.style.display = 'none';
                    showPhase3();
                }, 1000);
            }, 1500);
            return;
        }

        if (/[，。]/.test(phase2Text[index2])) {
            setTimeout(() => {
                typeCharacter2();
            }, 400); // 增加标点符号后的停顿时间
        } else {
            setTimeout(typeCharacter2, 150); // 增加逐字显示的时间间隔
        }
    };

    // 启动第三阶段
    function showPhase3() {
        const msg2 = document.getElementById('msg2');
        const msg3 = document.getElementById('msg3');
        
        msg2.style.display = 'block';
        msg2.style.animation = 'textAppear 3s forwards';
        setTimeout(() => {
            msg3.style.display = 'block';
            msg3.style.animation = 'textAppear 3s forwards';
        }, 2500);
    }

    // 启动第二阶段
    function startPhase2() {
        msg4.style.display = 'block';
        typeCharacter2();
    }

    // 启动第一阶段
    typeCharacter1();
});

// 窗口调整
window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
});

// 背景渐变
const bgGradient = document.createElement('div');
bgGradient.style = `
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    background: radial-gradient(circle at 50% 50%, #FF149330, #000000);
    pointer-events: none;
    z-index: 1;
`;
document.body.appendChild(bgGradient);
</script>
</body>
</html>
